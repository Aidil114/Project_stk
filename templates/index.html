<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistem Temu Kembali Informasi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 32px 20px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.5px; }
    header p  { margin-top: 6px; font-size: 0.9rem; opacity: 0.75; }

    /* ── Stats Bar ── */
    #stats-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      background: #0f3460;
      padding: 10px 20px;
      font-size: 0.82rem;
      color: #a8d8ea;
      flex-wrap: wrap;
    }
    #stats-bar span b { color: #fff; }

    /* ── Search Box ── */
    .search-container {
      max-width: 780px;
      margin: 32px auto 0;
      padding: 0 16px;
    }

    .search-box {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .search-row {
      display: flex;
      gap: 10px;
    }

    #query-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #query-input:focus { border-color: #0f3460; }

    #search-btn {
      padding: 12px 24px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #search-btn:hover { background: #1a4a8a; }
    #search-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* ── Options ── */
    .search-options {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-options label { font-size: 0.85rem; color: #64748b; font-weight: 500; }

    .search-options select {
      padding: 7px 12px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    .method-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid #e2e8f0;
      background: white;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #475569;
      font-weight: 500;
    }
    .pill:hover  { border-color: #0f3460; color: #0f3460; }
    .pill.active { background: #0f3460; color: white; border-color: #0f3460; }

    /* ── Quick queries ── */
    .quick-queries {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .quick-queries span { font-size: 0.8rem; color: #94a3b8; }
    .quick-btn {
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      font-size: 0.8rem;
      cursor: pointer;
      color: #475569;
      transition: all 0.15s;
    }
    .quick-btn:hover { background: #e2e8f0; }

    /* ── Results ── */
    .results-container {
      max-width: 780px;
      margin: 24px auto 40px;
      padding: 0 16px;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 0.88rem;
      color: #64748b;
    }
    .results-header b { color: #1e293b; }

    /* ── Token info ── */
    .token-info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.82rem;
      color: #1e40af;
    }
    .token-tag {
      display: inline-block;
      background: #1e40af;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      margin: 2px 2px;
      font-size: 0.78rem;
    }

    /* ── Result card ── */
    .result-card {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid #e2e8f0;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .result-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .result-card.rank-1 { border-left-color: #f59e0b; }
    .result-card.rank-2 { border-left-color: #94a3b8; }
    .result-card.rank-3 { border-left-color: #b45309; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .rank-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: #475569;
      flex-shrink: 0;
    }
    .rank-1 .rank-badge { background: #fef3c7; color: #92400e; }
    .rank-2 .rank-badge { background: #f1f5f9; color: #334155; }
    .rank-3 .rank-badge { background: #fef3c7; color: #78350f; opacity: 0.7; }

    .card-title {
      flex: 1;
      font-size: 0.97rem;
      font-weight: 600;
      color: #1e293b;
      line-height: 1.4;
    }
    .card-title a {
      color: #0f3460;
      text-decoration: none;
    }
    .card-title a:hover { text-decoration: underline; }

    .score-badge {
      background: #0f3460;
      color: white;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .card-meta {
      margin-top: 8px;
      display: flex;
      gap: 12px;
      font-size: 0.78rem;
      color: #94a3b8;
      flex-wrap: wrap;
    }

    .score-detail {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    .score-chip {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .score-chip.bert  { background: #ede9fe; color: #6d28d9; }
    .score-chip.tfidf { background: #d1fae5; color: #065f46; }

    .card-isi {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.6;
    }

    /* ── Loading & empty ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #0f3460;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.8rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<header>
  <h1>🔍 Sistem Temu Kembali Informasi</h1>
  <p>BERT + TF-IDF + Query Expansion | 50 Artikel tvonenews.com</p>
</header>

<div id="stats-bar">
  <span>📁 Dokumen: <b id="s-dok">-</b></span>
  <span>📖 Thesaurus: <b id="s-kata">-</b> kata</span>
  <span>🤖 Model: <b>paraphrase-multilingual-MiniLM-L12-v2</b></span>
</div>

<div class="search-container">
  <div class="search-box">
    <div class="search-row">
      <input id="query-input" type="text"
             placeholder="Masukkan kata kunci pencarian..."
             onkeydown="if(event.key==='Enter') doSearch()"/>
      <button id="search-btn" onclick="doSearch()">🔍 Cari</button>
    </div>

    <div class="search-options">
      <label>Metode:</label>
      <div class="method-pills">
        <div class="pill" onclick="setMethod('tfidf')" id="m-tfidf">TF-IDF</div>
        <div class="pill" onclick="setMethod('tfidf_expanded')" id="m-tfidf_expanded">TF-IDF + QE</div>
        <div class="pill" onclick="setMethod('bert')" id="m-bert">BERT</div>
        <div class="pill active" onclick="setMethod('hybrid')" id="m-hybrid">Hybrid ⭐</div>
      </div>
      <label style="margin-left:12px">Top:</label>
      <select id="top-n">
        <option value="5" selected>5</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="quick-queries">
      <span>Coba:</span>
      <button class="quick-btn" onclick="quickSearch('bandara penerbangan')">bandara penerbangan</button>
      <button class="quick-btn" onclick="quickSearch('timnas indonesia')">timnas indonesia</button>
      <button class="quick-btn" onclick="quickSearch('banjir jakarta')">banjir jakarta</button>
    </div>
  </div>
</div>

<div class="results-container" id="results-container"></div>

<footer>Sistem Temu Kembali Informasi · Tugas Mata Kuliah · tvonenews.com</footer>

<script>
  let currentMethod = 'hybrid';

  // Load stats
  fetch('/api/stats')
    .then(r => r.json())
    .then(d => {
      document.getElementById('s-dok').textContent  = d.total_dokumen;
      document.getElementById('s-kata').textContent = d.total_kata;
    });

  function setMethod(m) {
    currentMethod = m;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    document.getElementById('m-' + m).classList.add('active');
  }

  function quickSearch(q) {
    document.getElementById('query-input').value = q;
    doSearch();
  }

  async function doSearch() {
    const query = document.getElementById('query-input').value.trim();
    if (!query) return;

    const btn = document.getElementById('search-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Mencari...';

    const container = document.getElementById('results-container');
    container.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        Sedang mencari dokumen relevan...
      </div>`;

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query : query,
          method: currentMethod,
          top_n : parseInt(document.getElementById('top-n').value)
        })
      });

      const data = await res.json();
      renderResults(data);
    } catch(e) {
      container.innerHTML = `<div class="empty"><div class="icon">⚠️</div>Terjadi kesalahan. Coba lagi.</div>`;
    }

    btn.disabled = false;
    btn.textContent = '🔍 Cari';
  }

  function renderResults(data) {
    const container = document.getElementById('results-container');

    if (!data.results || data.results.length === 0) {
      container.innerHTML = `<div class="empty"><div class="icon">🔍</div>Tidak ada dokumen yang relevan ditemukan.</div>`;
      return;
    }

    const methodLabel = {
      tfidf         : 'TF-IDF Original',
      tfidf_expanded: 'TF-IDF + Query Expansion',
      bert          : 'BERT Semantic Search',
      hybrid        : 'Hybrid (BERT + TF-IDF + QE)'
    };

    // Token info
    const tokenHtml = data.tokens.map(t =>
      `<span class="token-tag">${t}</span>`).join('');

    let html = `
      <div class="results-header">
        <span>Ditemukan <b>${data.total}</b> dokumen — Metode: <b>${methodLabel[data.method]}</b></span>
      </div>
      <div class="token-info">
        🔤 Token query: ${tokenHtml}
      </div>`;

    data.results.forEach(r => {
      const rankClass = r.rank <= 3 ? `rank-${r.rank}` : '';
      const scoreDetail = (data.method === 'hybrid')
        ? `<div class="score-detail">
             <span class="score-chip bert">BERT: ${r.bert_score}</span>
             <span class="score-chip tfidf">TF-IDF: ${r.tfidf_score}</span>
           </div>`
        : '';

      html += `
        <div class="result-card ${rankClass}">
          <div class="card-header">
            <div class="rank-badge">${r.rank}</div>
            <div class="card-title">
              <a href="${r.url}" target="_blank" rel="noopener">${r.judul}</a>
            </div>
            <div class="score-badge">${r.score}</div>
          </div>
          ${scoreDetail}
          <div class="card-meta">
            <span>📄 No. ${r.no}</span>
            <span>🔗 <a href="${r.url}" target="_blank" style="color:#94a3b8">${r.url.substring(0,55)}...</a></span>
          </div>
          <div class="card-isi">${r.isi}</div>
        </div>`;
    });

    container.innerHTML = html;
  }
</script>
</body>
</html>
